version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  ros2-sim:
    build: .
    container_name: ros2-sim
    command: ros2 run ros2_mqtt_bridge mock_robot_sim
    depends_on:
      - mqtt-broker
    volumes:
      - ./data:/data
    restart: unless-stopped

  ros2-bridge:
    build: .
    container_name: ros2-bridge
    command: ros2 run ros2_mqtt_bridge mqtt_bridge_node --ros-args -p mqtt_host:=mqtt-broker -p db_path:=/data/local_robot.db
    depends_on:
      - mqtt-broker
    volumes:
      - ./data:/data
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
